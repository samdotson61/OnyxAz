name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Use `npm install` rather than `npm ci`: the lockfile is generated on
        # Windows, and `npm ci` does not reliably install platform-native optional
        # deps (rolldown/lightningcss/esbuild) on Linux (npm/cli#4828). `npm install`
        # re-resolves the correct binaries for the runner's platform.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
